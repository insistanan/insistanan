name: Generate Snake Animation

permissions:
  contents: write

on:
  schedule:
    # 每天 UTC 0 点自动运行一次
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:
  # 每次 push 也触发一次（首次生成用）
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 步骤1：检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤2：生成贪吃蛇 SVG
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # 步骤3：修复 Docker 生成目录的写入权限
      - name: Fix Dist Permissions
        run: sudo chown -R "$USER:$USER" dist

      # 步骤4：生成 GitHub 统计静态卡片
      - name: Generate GitHub Stats Cards
        run: node .github/scripts/generate-readme-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤5：发布到 output 分支
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
